<script src="data.js"></script>

<script>
// ... (Giữ nguyên biến dict đa ngôn ngữ và weekDates ở đây) ...
const dict = {
    vi: {
        sysTitle: "HIỆU SUẤT TUYẾN BÁN HÀNG", fMonth: "Tháng", fWeek: "Tuần", fRegion: "Miền", fArea: "Khu vực", optAll: "Tất cả", 
        allKam: "🏠︎ TẤT CẢ KAM", allKae: "🏠︎ TẤT CẢ KAE/DSR", kpiSales: "TỔNG SELL OUT", kpiSalesSub: "VNĐ (Chưa VAT)", 
        kpiTotal: "TỔNG KH TRÊN TUYẾN", kpiTotalSub: "khách hàng", kpiActive: "Khách Active", kpiActiveSub: "khách hàng", 
        kpiStrike: "Strike Rate", kpiStrikeSub: "Tỷ lệ KH Active / Tổng", cAreaTitle: "HIỆU SUẤT THEO KHU VỰC (AREA)", 
        cKamTitle: "HIỆU SUẤT DOANH SỐ VÀ KHÁCH HÀNG BY KAM", cDayTitle: "HIỆU SUẤT DOANH SỐ VÀ KHÁCH HÀNG BY KAE",
        axisCust: "Đơn vị: Mã KH", axisVnd: "Đơn vị: VNĐ", legSales: "Doanh số", legTotal: "Tổng KH", legActive: "KH Active",
        tblColArea: "Chỉ số / Khu vực", tblColKam: "Chỉ số / Ngày (KAM)", tblColDay: "Chỉ số / Ngày (KAE)",
        rowRoute: "Tuyến", rowTotal: "KH Kế Hoạch (Master)", rowActive: "KH Lên đơn", rowSales: "Doanh số (VND)", rowSku: "SKU / Đơn (Avg)", rowStrike: "Strike Rate",
        days: ["T2", "T3", "T4", "T5", "T6", "T7"], multiRoute: "Nhiều tuyến", noRoute: "Không có tuyến",
        kamSales: "TỔNG SELL OUT KAM", kamSalesSub: "VNĐ (Chưa VAT)", kamBR: "TỶ LỆ LÊN ĐƠN CỦA TEAM", kamBRSub: "Tỷ lệ KH Active / Tổng tuyến",
        kamContribArea: "ĐÓNG GÓP SELL OUT CHO AREA", kamContribAreaSub: "% Doanh số Area", kamContribNation: "ĐÓNG GÓP SELL OUT CHO TOÀN QUỐC", kamContribNationSub: "% Doanh số Toàn quốc",
        kaeSales: "TỔNG SELL OUT KAE", kaeBR: "TỶ LỆ LÊN ĐƠN CỦA KHÁCH HÀNG DO KAE CHĂM SÓC", kaeContribArea: "ĐÓNG GÓP SELL OUT CỦA KAE CHO AREA", kaeContribNation: "ĐÓNG GÓP SELL OUT CỦA KAE CHO TOÀN QUỐC",
        cWeekTitle: "HIỆU SUẤT DOANH SỐ VÀ KHÁCH HÀNG THEO TUẦN", cWeekSubtitle: "TỔNG HỢP DỮ LIỆU CÁC TUẦN", tblColWeek: "Chỉ số / Tuần"
    },
    en: {
        sysTitle: "ROUTE PRODUCTIVITIES REPORT", fMonth: "Month", fWeek: "Week", fRegion: "Region", fArea: "Area", optAll: "All", 
        allKam: "🏠︎ ALL KAMs", allKae: "🏠︎ ALL KAE/DSRs", kpiSales: "Total SELL OUT", kpiSalesSub: "VND (Excl. VAT)", 
        kpiTotal: "ROUTE TOTAL CUS.", kpiTotalSub: "Customers", kpiActive: "Active Customers", kpiActiveSub: "Customers", 
        kpiStrike: "Strike Rate", kpiStrikeSub: "Active / Total Ratio", cAreaTitle: "PERFORMANCE BY AREA", 
        cKamTitle: "SALES & CUSTOMER PERFORMANCE BY KAM", cDayTitle: "SALES & CUSTOMER PERFORMANCE BY KAE",
        axisCust: "Unit: Cust. Codes", axisVnd: "Unit: VND", legSales: "Sales", legTotal: "Planned Cust.", legActive: "Active Cust.",
        tblColArea: "Metric / Area", tblColKam: "Metric / Day (KAM)", tblColDay: "Metric / Day (KAE)",
        rowRoute: "Route", rowTotal: "Planned Route Cust.", rowActive: "Ordered Cust.", rowSales: "Sales (VND)", rowSku: "Avg SKU / Invc", rowStrike: "Strike Rate",
        days: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat"], multiRoute: "Multiple", noRoute: "No route",
        kamSales: "TOTAL SELL OUT BY KAM", kamSalesSub: "VND (Excl. VAT)", kamBR: "CUSTOMER BUYING RATE", kamBRSub: "Active / Total Route",
        kamContribArea: "SELL OUT CONTRIBUTES TO AREA", kamContribAreaSub: "% Sales / Area", kamContribNation: "SELL OUT CONTRIBUTES TO NATIONWIDE", kamContribNationSub: "% Sales / Nationwide",
        kaeSales: "TOTAL SELL OUT BY KAE", kaeBR: "CUSTOMER BUYING RATE", kaeContribArea: "KAE SELL OUT CONTRIBUTES TO AREA", kaeContribNation: "KAE SELL OUT CONTRIBUTES TO NATIONWIDE",
        cWeekTitle: "WEEKLY SELL OUT SUMMARY", cWeekSubtitle: "WEEKLY DATA SUMMARY", tblColWeek: "Metric / Week"
    }
};

const weekDates = { vi: { "all": "Báo cáo tổng hợp tất cả các tuần", "W0": "W0", "W1": "W1", "W2": "W2", "W3": "W3", "W4": "W4" }, en: { "all": "Summary report for all weeks", "W0": "W0", "W1": "W1", "W2": "W2", "W3": "W3", "W4": "W4" } };
let lang = 'vi';
let filters = { month: "all", week: "all", hq: "all", area: "all", kam: "all", kae: "all" };
let charts = {};

const t = (key) => dict[lang][key] || key;
const fmt = (n) => new Intl.NumberFormat('en-US').format(Math.round(n || 0));

/* ==========================================================================
   >>> TỰ ĐỘNG VLOOKUP & LỌC DỮ LIỆU <<<
   ========================================================================== */
let enrichedMaster = []; // Mảng dbMaster sau khi đã đắp thêm KAM, HQ, Area

function prepareData() {
    if (typeof dbMaster === 'undefined' || typeof dbSales === 'undefined') return;

    // 1. Tạo "Từ điển" chứa thông tin KAM, HQ, Area từ mảng dbSales
    const kaeMap = {};
    dbSales.forEach(d => {
        if (d.kae && d.kam && d.kam.trim() !== "") {
            kaeMap[d.kae] = { hq: d.hq, area: d.area, kam: d.kam };
        }
    });

    // 2. VLOOKUP từ điển vào dbMaster. Nếu không có KAM -> Tự động bỏ qua
    enrichedMaster = [];
    dbMaster.forEach(d => {
        let mapInfo = kaeMap[d.kae];
        if (mapInfo) { 
            enrichedMaster.push({
                ...d, // Copy thông tin có sẵn (kae, month, week, day, cusCode, rt)
                hq: mapInfo.hq,
                area: mapInfo.area,
                kam: mapInfo.kam
            });
        }
    });
}

const parseDay = (dayStr) => {
    const d = String(dayStr).toLowerCase().trim();
    if (d.includes("mon") || d === "t2" || d === "2") return 0;
    if (d.includes("tue") || d === "t3" || d === "3") return 1;
    if (d.includes("wed") || d === "t4" || d === "4") return 2;
    if (d.includes("thu") || d === "t5" || d === "5") return 3;
    if (d.includes("fri") || d === "t6" || d === "6") return 4;
    if (d.includes("sat") || d === "t7" || d === "7") return 5;
    return -1; 
};

const aggregateDualData = (masterSubset, salesSubset) => {
    let masterSet = new Set();
    masterSubset.forEach(d => { if (d.cusCode) masterSet.add(d.cusCode); });
    let totalC = masterSet.size;

    let sales = 0, skuLines = 0, invoiceCount = 0;
    let salesSet = new Set();
    
    salesSubset.forEach(d => {
        let currentSales = Number(d.sales) || 0;
        if (currentSales > 0) {
            sales += currentSales;
            skuLines += (Number(d.skuLines) || 0);
            invoiceCount++;
            if (d.cusCode) salesSet.add(d.cusCode);
        }
    });

    let activeC = salesSet.size;
    let avgSku = invoiceCount > 0 ? (skuLines / invoiceCount) : 0;
    return { s: sales, tc: totalC, ac: activeC, avgSku: avgSku };
};

function initResizer() {
    const resizer = document.getElementById('dragMe');
    let isResizing = false;
    resizer.addEventListener('mousedown', function(e) { isResizing = true; document.body.classList.add('no-select'); resizer.classList.add('resizing'); });
    document.addEventListener('mousemove', function(e) {
        if (!isResizing) return;
        let newWidth = e.clientX;
        if (newWidth < 250) newWidth = 250;
        if (newWidth > 700) newWidth = 700;
        document.documentElement.style.setProperty('--sidebar-width', newWidth + 'px');
    });
    document.addEventListener('mouseup', function(e) { if (isResizing) { isResizing = false; document.body.classList.remove('no-select'); resizer.classList.remove('resizing'); } });
}

function setLang(newLang) {
    lang = newLang;
    document.getElementById('btn-vi').className = lang === 'vi' ? 'active' : '';
    document.getElementById('btn-en').className = lang === 'en' ? 'active' : '';
    document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t(el.getAttribute('data-i18n')); });
    renderFilters(); render();
}

function init() {
    prepareData(); // 🔥 Chạy Auto-VLOOKUP ngay khi khởi động
    
    ['monthFilter', 'weekFilter', 'hqFilter', 'areaFilter'].forEach(id => {
        document.getElementById(id).addEventListener('change', e => { filters[id.replace('Filter','')] = e.target.value; renderFilters(); render(); });
    });
    setLang('vi'); 
    initResizer(); 
}

function updateF(type, val) { filters[type] = val; if (type === 'kam') filters.kae = "all"; renderFilters(); render(); }

function renderFilters() {
    // 🔥 Sử dụng enrichedMaster thay cho dbMaster
    const monthSel = document.getElementById("monthFilter");
    let availableMonths = [...new Set(enrichedMaster.map(d => d.month))].filter(Boolean);
    const monthOrder = { "jan":1, "feb":2, "mar":3, "apr":4, "may":5, "jun":6, "jul":7, "aug":8, "sep":9, "oct":10, "nov":11, "dec":12 };
    availableMonths.sort((a,b) => (monthOrder[a.toLowerCase()]||99) - (monthOrder[b.toLowerCase()]||99));
    if (filters.month !== "all" && !availableMonths.includes(filters.month)) filters.month = "all";
    
    monthSel.innerHTML = `<option value="all" data-i18n="optAll">${t('optAll')}</option>`;
    availableMonths.forEach(m => { monthSel.innerHTML += `<option value="${m}" ${filters.month === m ? 'selected' : ''}>${m.charAt(0).toUpperCase() + m.slice(1).toLowerCase()}</option>`; });

    const areaSel = document.getElementById("areaFilter");
    const dArea = enrichedMaster.filter(d => (filters.month === "all" || d.month === filters.month) && (filters.hq === "all" || d.hq === filters.hq));
    const availableAreas = [...new Set(dArea.map(d => d.area))].filter(Boolean).sort();
    if (filters.area !== "all" && !availableAreas.includes(filters.area)) filters.area = "all";
    
    areaSel.innerHTML = `<option value="all" data-i18n="optAll">${t('optAll')}</option>`;
    availableAreas.forEach(a => { areaSel.innerHTML += `<option value="${a}" ${filters.area === a ? 'selected' : ''}>${a}</option>`; });

    const fData = enrichedMaster.filter(d => (filters.month === "all" || d.month === filters.month) && (filters.week === "all" || d.week === filters.week) && (filters.hq === "all" || d.hq === filters.hq) && (filters.area === "all" || d.area === filters.area));
    const kList = document.getElementById("kamList");
    const aKams = [...new Set(fData.map(d => d.kam))].sort();
    kList.innerHTML = `<div class="list-item ${filters.kam === 'all' ? 'selected' : ''}" onclick="updateF('kam', 'all')">${t('allKam')}</div>`;
    aKams.forEach(k => { kList.innerHTML += `<div class="list-item ${filters.kam === k ? 'selected' : ''}" onclick="updateF('kam', '${k}')">${k}</div>`; });
    
    const kaeList = document.getElementById("kaeList");
    const dKae = filters.kam === "all" ? fData : fData.filter(d => d.kam === filters.kam);
    const aKaes = [...new Set(dKae.map(d => d.kae))].sort();
    kaeList.innerHTML = `<div class="list-item ${filters.kae === 'all' ? 'selected' : ''}" onclick="updateF('kae', 'all')">${t('allKae')}</div>`;
    aKaes.forEach(n => { kaeList.innerHTML += `<div class="list-item ${filters.kae === n ? 'selected' : ''}" onclick="updateF('kae', '${n}')">${n}</div>`; });
}

function getChartOptions() {
    return { responsive:true, maintainAspectRatio:false, layout: { padding: { top: 30 } }, scales: { y: { beginAtZero: true, title: { display:true, text: t('axisCust'), font:{weight:'bold', size:12}, align:'end', padding: { bottom: 10 } }, ticks:{ stepSize: 1, font:{size:10} }, grid: { color: 'rgba(0,0,0,0.05)' } }, yS: { position:'right', grid:{drawOnChartArea:false}, beginAtZero: true, title: { display:true, text: t('axisVnd'), font:{weight:'bold', size:12}, align:'end', padding: { bottom: 10 } }, ticks:{ font:{size:10}, callback: (v) => fmt(v) } }, x: { grid: { display: false }, ticks: { font: { weight: 'bold' } } } }, plugins: { legend: { position: 'bottom', labels: { boxWidth: 15, font: { size: 11 } } } } };
}

function drawChart(chartId, dataArray, labelKey) {
    if(charts[chartId]) charts[chartId].destroy();
    charts[chartId] = new Chart(document.getElementById(chartId), {
        data: {
            labels: dataArray.map(x => x[labelKey]),
            datasets: [
                { type:'line', label: t('legSales'), data: dataArray.map(x => (x.s === "-" ? null : x.s)), borderColor:'#185FA5', backgroundColor:'#185FA5', yAxisID:'yS', order: 0, tension: 0.3, pointRadius: 5 },
                { type:'bar', label: t('legTotal'), data: dataArray.map(x => (x.tc === "-" ? null : x.tc)), backgroundColor:'#B5D4F4', order: 1 },
                { type:'bar', label: t('legActive'), data: dataArray.map(x => (x.ac === "-" ? null : x.ac)), backgroundColor:'#378ADD', order: 1 }
            ]
        }, options: getChartOptions()
    });
}

function drawTable(headerId, bodyId, dataArray, titleColName, labelKey, isKaeTable = false, isWeekTable = false, showTotal = false, explicitTotal = null) {
    let renderData = [...dataArray];
    if (showTotal && explicitTotal) renderData.push(explicitTotal);

    if (isWeekTable) {
        document.getElementById(headerId).innerHTML = `<th class="label-cell">${titleColName}</th>` + renderData.map(x => {
            let isTotalCol = showTotal && x === renderData[renderData.length - 1];
            return `<th style="${isTotalCol ? 'background: #042C53;' : ''}">${x[labelKey]}</th>`;
        }).join("");
    } else {
        document.getElementById(headerId).innerHTML = `<th class="label-cell">${titleColName}</th>` + renderData.map(x => {
            let isTotalCol = showTotal && x === renderData[renderData.length - 1];
            return `<th style="${isTotalCol ? 'background: #042C53;' : ''}">${x[labelKey]}</th>`;
        }).join("");
    }
    
    let rows = [];
    if (isKaeTable) { rows.push({ l: t('rowRoute'), k: "route", f: v => `<span style="color:var(--b6); font-weight:600">${v || "-"}</span>` }); }
    
    rows.push(
        { l: t('rowTotal'), k: "tc", f: v => v === "-" ? "-" : fmt(v) },
        { l: t('rowActive'), k: "ac", f: v => v === "-" ? "-" : `<b style="color:green">${fmt(v)}</b>` },
        { l: t('rowSales'), k: "s", f: v => v === "-" ? "-" : fmt(v) },
        { l: t('rowSku'), k: "avgSku", f: v => v === "-" ? "-" : `<span style="color:var(--b5); font-weight:700">${Number(v||0).toFixed(1)}</span>` },
        { l: t('rowStrike'), k: "r", f: (_, i) => (i.tc > 0 && i.tc !== "-" && i.ac !== "-") ? `<b>${(i.ac/i.tc*100).toFixed(1)}%</b>` : '-' }
    );

    document.getElementById(bodyId).innerHTML = rows.map(r => `<tr><td class="label-cell">${r.l}</td>${renderData.map(item => { let isTotalCol = showTotal && item === renderData[renderData.length - 1]; return `<td style="${isTotalCol ? 'background: var(--b1); font-weight: bold;' : ''}">${r.f(item[r.k], item)}</td>`; }).join("")}</tr>`).join("");
}

function render() {
    if (typeof dbMaster === 'undefined' || typeof dbSales === 'undefined') return; 
    
    const isAllWeeks = filters.week === "all";
    const selectedWeekText = isAllWeeks ? weekDates[lang]["all"] : (weekDates[lang][filters.week] || "");
    document.querySelectorAll('.chart-subtitle:not([data-i18n="cWeekSubtitle"])').forEach(el => { el.innerText = selectedWeekText; });

    const subtitleEl = document.querySelector('.chart-subtitle[data-i18n="cWeekSubtitle"]');
    if (subtitleEl) subtitleEl.innerText = `${t('fMonth')}: ${filters.month === "all" ? t('optAll') : filters.month.toUpperCase()} | ${t('fRegion')}: ${filters.hq === "all" ? t('optAll') : filters.hq} | ${t('fArea')}: ${filters.area === "all" ? t('optAll') : filters.area} | KAM: ${filters.kam === "all" ? t('optAll') : filters.kam} | KAE: ${filters.kae === "all" ? t('optAll') : filters.kae}`;

    const applyFilters = (d) => (filters.month === "all" || d.month === filters.month) && (filters.week === "all" || d.week === filters.week) && (filters.hq === "all" || d.hq === filters.hq) && (filters.area === "all" || d.area === filters.area);
    
    // 🔥 Sử dụng enrichedMaster thay cho dbMaster
    const workMaster = enrichedMaster.filter(applyFilters);
    const workSales = dbSales.filter(applyFilters);

    const sysKPI = aggregateDualData(workMaster, workSales);
    document.getElementById("val-sales").innerText = fmt(sysKPI.s);
    document.getElementById("val-cust").innerText = fmt(sysKPI.tc);
    document.getElementById("val-strike").innerText = fmt(sysKPI.ac);
    document.getElementById("val-strike-rate").innerText = (sysKPI.tc > 0 ? (sysKPI.ac/sysKPI.tc*100).toFixed(1) : 0) + "%";

    const areas = [...new Set(workMaster.map(d=>d.area))].filter(Boolean).sort(); 
    const areaData = areas.map(a => ({ label: a, ...aggregateDualData(workMaster.filter(d => d.area === a), workSales.filter(d => d.area === a)) }));
    drawChart('areaChart', areaData, 'label');
    drawTable('areaHeaderRow', 'areaTableBody', areaData, t('tblColArea'), 'label', false, false, true, { label: lang === 'vi' ? "TỔNG" : "TOTAL", ...sysKPI, route: "-" });

    let cKam = filters.kam;
    if (cKam === "all" && filters.kae !== "all") { const fKam = enrichedMaster.find(d => d.kae === filters.kae); if (fKam) cKam = fKam.kam; }
    
    const kamMaster = workMaster.filter(d => cKam === "all" || d.kam === cKam);
    const kamSalesData = workSales.filter(d => cKam === "all" || d.kam === cKam);
    const kaeMaster = kamMaster.filter(d => filters.kae === "all" || d.kae === filters.kae);
    const kaeSalesData = kamSalesData.filter(d => filters.kae === "all" || d.kae === filters.kae);

    const getDayData = (mSubset, sSubset) => {
        return [0, 1, 2, 3, 4, 5].map(idx => {
            const mDay = mSubset.filter(d => parseDay(d.day) === idx);
            const sDay = sSubset.filter(d => parseDay(d.day) === idx);
            const agg = aggregateDualData(mDay, sDay);
            
            let routes = new Set(); 
            mDay.forEach(d => { 
                let r = d.rt ? String(d.rt).trim() : ""; 
                if (r && r !== "0" && r.toLowerCase() !== "no route") {
                    routes.add(r.toUpperCase());
                }
            });
            let routeStr = routes.size === 0 ? "-" : Array.from(routes).sort().join("/");
            
            return { d: t('days')[idx], ...agg, route: routeStr };
        });
    };

    const kamDayData = getDayData(kamMaster, kamSalesData);
    const kamAgg = aggregateDualData(kamMaster, kamSalesData);
    drawChart('kamChart', kamDayData, 'd');
    drawTable('kamHeaderRow', 'kamTableBody', kamDayData, t('tblColKam'), 'd', false, false, true, { 'd': lang === 'vi' ? "TỔNG" : "TOTAL", ...kamAgg, route: "-" }); 

    const kaeDayData = getDayData(kaeMaster, kaeSalesData);
    const kaeAgg = aggregateDualData(kaeMaster, kaeSalesData);
    drawChart('dayChart', kaeDayData, 'd');
    drawTable('dayHeaderRow', 'dayTableBody', kaeDayData, t('tblColDay'), 'd', true, false, true, { 'd': lang === 'vi' ? "TỔNG" : "TOTAL", ...kaeAgg, route: "-" }); 

    const areaSalesTotal = areaData.reduce((sum, a) => sum + a.s, 0);
    const nationSalesTotal = dbSales.filter(d => (filters.month === "all" || d.month === filters.month) && (filters.week === "all" || d.week === filters.week)).reduce((a,b)=>a+(Number(b.sales)||0),0);

    document.getElementById("kam-val-sales").innerText = fmt(kamAgg.s); document.getElementById("kam-val-buying-rate").innerText = kamAgg.tc > 0 ? (kamAgg.ac / kamAgg.tc * 100).toFixed(1) + "%" : "0%";
    document.getElementById("kam-val-contrib-area").innerText = areaSalesTotal > 0 ? (kamAgg.s / areaSalesTotal * 100).toFixed(1) + "%" : "0%"; document.getElementById("kam-val-contrib-nation").innerText = nationSalesTotal > 0 ? (kamAgg.s / nationSalesTotal * 100).toFixed(1) + "%" : "0%";
    document.getElementById("kae-val-sales").innerText = fmt(kaeAgg.s); document.getElementById("kae-val-buying-rate").innerText = kaeAgg.tc > 0 ? (kaeAgg.ac / kaeAgg.tc * 100).toFixed(1) + "%" : "0%";
    document.getElementById("kae-val-contrib-area").innerText = areaSalesTotal > 0 ? (kaeAgg.s / areaSalesTotal * 100).toFixed(1) + "%" : "0%"; document.getElementById("kae-val-contrib-nation").innerText = nationSalesTotal > 0 ? (kaeAgg.s / nationSalesTotal * 100).toFixed(1) + "%" : "0%";

    const mMonth = enrichedMaster.filter(d => (filters.month === "all" || d.month === filters.month) && (filters.hq === "all" || d.hq === filters.hq) && (filters.area === "all" || d.area === filters.area) && (filters.kam === "all" || d.kam === filters.kam) && (filters.kae === "all" || d.kae === filters.kae));
    const sMonth = dbSales.filter(d => (filters.month === "all" || d.month === filters.month) && (filters.hq === "all" || d.hq === filters.hq) && (filters.area === "all" || d.area === filters.area) && (filters.kam === "all" || d.kam === filters.kam) && (filters.kae === "all" || d.kae === filters.kae));
    const realWeeks = [...new Set(mMonth.map(d=>d.week))].sort();
    
    const weekData = realWeeks.map(w => ({ label: w, ...aggregateDualData(mMonth.filter(d => d.week === w), sMonth.filter(d => d.week === w)) }));
    drawChart('weekChart', weekData, 'label');
    drawTable('weekHeaderRow', 'weekTableBody', weekData, t('tblColWeek'), 'label', false, true, true, { label: lang === 'vi' ? "TỔNG" : "TOTAL", ...aggregateDualData(mMonth, sMonth), route: "-" });
}

window.onload = init;
</script>
